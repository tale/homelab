apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: blocky
  namespace: default
spec:
  selector:
    matchLabels:
      app: me.tale.blocky
  template:
    metadata:
      labels:
        app: me.tale.blocky
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: config-builder
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              DB_URI=$(cat /secrets/uri)
              sed "s|__DB_URI__|${DB_URI}|g" /config-template/config.yml > /config/config.yml
          volumeMounts:
            - name: config-template
              mountPath: /config-template
            - name: db-secret
              mountPath: /secrets
            - name: rendered-config
              mountPath: /config
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop: ["ALL"]
      containers:
        - name: blocky
          image: ghcr.io/0xerr0r/blocky:latest
          ports:
            - name: dns
              containerPort: 53
              protocol: UDP
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: http
              containerPort: 4000
              protocol: TCP
          env:
            - name: TZ
              value: America/New_York
          volumeMounts:
            - name: rendered-config
              mountPath: /app/config.yml
              subPath: config.yml
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop: ["ALL"]
              add:
                - NET_BIND_SERVICE
          readinessProbe:
            tcpSocket:
              port: 53
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 53
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: config-template
          configMap:
            name: blocky-config
        - name: db-secret
          secret:
            secretName: blocky-db-uri
        - name: rendered-config
          emptyDir: {}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: blocky-pdb
  namespace: default
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: me.tale.blocky
