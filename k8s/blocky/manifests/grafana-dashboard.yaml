apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: blocky
  namespace: default
spec:
  instanceSelector:
    matchLabels:
      dashboards: "homelab"
  allowCrossNamespaceImport: true
  folder: Applications
  grafanaCom:
    id: 17996
  datasources:
    - inputName: "DS_BLOCKY-POSTGRESQL"
      datasourceName: "Blocky Postgres"
