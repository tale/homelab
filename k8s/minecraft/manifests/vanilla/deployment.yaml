---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "vanilla"
  namespace: "minecraft"
  labels:
    app.kubernetes.io/name: "vanilla"
spec:
  replicas: 1
  strategy:
    type: "Recreate"
  selector:
    matchLabels:
      app.kubernetes.io/name: "vanilla"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "vanilla"
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        seccompProfile:
          type: "RuntimeDefault"
      containers:
        - name: "minecraft"
          image: "itzg/minecraft-server:java25"
          imagePullPolicy: "IfNotPresent"
          env:
            - name: "EULA"
              value: "TRUE"
            - name: "TYPE"
              value: "VANILLA"
            - name: "VERSION"
              value: "26.1.2"
            - name: "MEMORY"
              value: "2G"
            - name: "USE_AIKAR_FLAGS"
              value: "true"
            - name: "TZ"
              value: "America/New_York"
            - name: "DIFFICULTY"
              value: "normal"
            - name: "VIEW_DISTANCE"
              value: "12"
            - name: "SIMULATION_DISTANCE"
              value: "12"
            - name: "MAX_PLAYERS"
              value: "2"
            - name: "MOTD"
              value: "Bauhause"
            - name: "ENABLE_WHITELIST"
              value: "true"
            - name: "ENFORCE_WHITELIST"
              value: "true"
            - name: "OVERRIDE_WHITELIST"
              value: "true"
            - name: "WHITELIST"
              value: "Aerum,semsclub"
            - name: "OPS"
              value: "Aerum,semsclub"
            - name: "PAUSE_WHEN_EMPTY_SECONDS"
              value: "60"
          ports:
            - name: "minecraft"
              containerPort: 25565
              protocol: "TCP"
          resources:
            requests:
              cpu: "1"
              memory: "2560Mi"
            limits:
              memory: "3Gi"
          volumeMounts:
            - name: "data"
              mountPath: "/data"
          startupProbe:
            exec:
              command:
                - "mc-health"
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 60
          livenessProbe:
            exec:
              command:
                - "mc-health"
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - "mc-health"
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 6
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - "ALL"
            seccompProfile:
              type: "RuntimeDefault"
      volumes:
        - name: "data"
          persistentVolumeClaim:
            claimName: "vanilla-data"
