---
apiVersion: "v1"
kind: "Service"
metadata:
  name: "vanilla-tailscale"
  namespace: "minecraft"
  annotations:
    tailscale.com/proxy-group: "ts-ingress"
    tailscale.com/hostname: "mc"
spec:
  type: "LoadBalancer"
  loadBalancerClass: "tailscale"
  ports:
    - name: "minecraft"
      port: 25565
      targetPort: 25565
      protocol: "TCP"
  selector:
    app.kubernetes.io/name: "vanilla"
