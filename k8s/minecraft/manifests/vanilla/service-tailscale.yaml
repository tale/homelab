---
# Exposes the server to the tailnet via the shared HA `ts-ingress` ProxyGroup
# (see k8s/infra/configs/tailscale/proxygroup.yaml). The operator creates a
# Tailscale Service fronted by every ProxyGroup replica, so the server stays
# reachable across proxy Pod restarts. The hostname annotation sets the first
# DNS label, making it reachable at "mc.heron-mahi.ts.net:25565" with no public
# exposure.
apiVersion: "v1"
kind: "Service"
metadata:
  name: "vanilla-tailscale"
  namespace: "minecraft"
  annotations:
    tailscale.com/proxy-group: "ts-ingress"
    tailscale.com/hostname: "mc"
spec:
  type: "LoadBalancer"
  loadBalancerClass: "tailscale"
  ports:
    - name: "minecraft"
      port: 25565
      targetPort: 25565
      protocol: "TCP"
  selector:
    app.kubernetes.io/name: "vanilla"
