---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "atm10"
  namespace: "minecraft-atm10"
  labels:
    app.kubernetes.io/name: "atm10"
spec:
  replicas: 1
  strategy:
    type: "Recreate"
  selector:
    matchLabels:
      app.kubernetes.io/name: "atm10"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "atm10"
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        seccompProfile:
          type: "RuntimeDefault"
      containers:
        - name: "minecraft"
          image: "itzg/minecraft-server:java21"
          imagePullPolicy: "IfNotPresent"
          env:
            - name: "EULA"
              value: "TRUE"
            - name: "TYPE"
              value: "AUTO_CURSEFORGE"
            - name: "CF_SLUG"
              value: "all-the-mods-10"
            - name: "CF_API_KEY"
              valueFrom:
                secretKeyRef:
                  name: "atm10-curseforge"
                  key: "CF_API_KEY"
            - name: "MEMORY"
              value: "12G"
            - name: "USE_AIKAR_FLAGS"
              value: "true"
            - name: "TZ"
              value: "America/New_York"
            - name: "VIEW_DISTANCE"
              value: "12"
            - name: "SIMULATION_DISTANCE"
              value: "8"
            - name: "MAX_PLAYERS"
              value: "2"
            - name: "MOTD"
              value: "All the Mods 10 - 1.21.4"
            - name: "ENABLE_AUTOPAUSE"
              value: "false"
            - name: "STOP_SERVER_ANNOUNCE_DELAY"
              value: "20"
          ports:
            - name: "minecraft"
              containerPort: 25565
              protocol: "TCP"
          resources:
            requests:
              cpu: "2"
              memory: "13Gi"
            limits:
              memory: "14Gi"
          volumeMounts:
            - name: "data"
              mountPath: "/data"
          startupProbe:
            exec:
              command:
                - "mc-health"
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 60
          livenessProbe:
            exec:
              command:
                - "mc-health"
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - "mc-health"
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 6
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - "ALL"
            seccompProfile:
              type: "RuntimeDefault"
      volumes:
        - name: "data"
          persistentVolumeClaim:
            claimName: "atm10-data"
