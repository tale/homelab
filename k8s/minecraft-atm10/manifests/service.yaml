---
apiVersion: "v1"
kind: "Service"
metadata:
  name: "atm10"
  namespace: "minecraft-atm10"
  annotations:
    metallb.io/address-pool: "minecraft-atm10-pool"
spec:
  type: "LoadBalancer"
  externalTrafficPolicy: "Local"
  ports:
    - name: "minecraft"
      port: 25565
      targetPort: 25565
      protocol: "TCP"
  selector:
    app.kubernetes.io/name: "atm10"
