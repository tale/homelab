apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: cert-manager
spec:
  interval: 1h
  chart:
    spec:
      chart: external-dns
      version: 8.7.3
      sourceRef:
        kind: HelmRepository
        name: external-dns
  values:
    provider: cloudflare
    cloudflare:
      proxied: true
    domainFilters:
      - tale.me
    sources:
      - gateway-httproute
    extraArgs:
      - --default-targets=h.tale.me
    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: cloudflare-api-token-secret
            key: api-token
