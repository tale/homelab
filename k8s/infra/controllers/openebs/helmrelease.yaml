apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openebs
  namespace: openebs
spec:
  interval: 1h
  chart:
    spec:
      chart: openebs
      version: 4.3.2
      sourceRef:
        kind: HelmRepository
        name: openebs
  install:
    createNamespace: true
  values:
    engines:
      local:
        lvm:
          enabled: false
        zfs:
          enabled: false
      replicated:
        mayastor:
          enabled: true
    monitoring:
      enabled: true
    mayastor:
      io_engine:
        envcontext: "iova-mode=pa"
      csi:
        node:
          initContainers:
            enabled: false
