apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: flux-operator
      version: ">=0.40.0"
      sourceRef:
        kind: HelmRepository
        name: flux-operator
  valuesFrom:
    - kind: Secret
      name: flux-ui-oidc-secret
      valuesKey: client-secret
      targetPath: web.config.authentication.oauth2.clientSecret
  values:
    web:
      enabled: true
      config:
        baseURL: https://flux.tale.me
        authentication:
          type: OAuth2
          oauth2:
            provider: OIDC
            clientID: 6VoYqXzcFTThzCT4QlxQAii4be1Z0vAck8yarWAq
            issuerURL: https://auth.tale.me/application/o/flux/
      httpRoute:
        enabled: true
        parentRefs:
          - name: envoy-gw
            namespace: default
            sectionName: https
        hostnames:
          - flux.tale.me
