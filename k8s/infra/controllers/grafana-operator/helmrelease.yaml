apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-operator
  namespace: observability-system
spec:
  interval: 1h
  chart:
    spec:
      chart: grafana-operator
      version: 5.22.2
      sourceRef:
        kind: HelmRepository
        name: grafana-operator
  install:
    createNamespace: true
  values:
    serviceMonitor:
      enabled: true
