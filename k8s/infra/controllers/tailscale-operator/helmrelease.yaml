apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: tailscale
spec:
  interval: 1h
  chart:
    spec:
      chart: tailscale-operator
      version: 1.98.4
      sourceRef:
        kind: HelmRepository
        name: tailscale
  values:
    # OAuth credentials are provided via the pre-created `operator-oauth`
    # Secret (keys: client_id / client_secret) rather than inline values.
    oauth: {}
    operatorConfig:
      hostname: tale-lab-operator
    # We only use the operator for cluster ingress (exposing the Minecraft
    # service to the tailnet), so the Kubernetes API server proxy is disabled.
    apiServerProxyConfig:
      mode: "false"
