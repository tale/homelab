apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: tailscale
spec:
  interval: 1h
  chart:
    spec:
      chart: tailscale-operator
      version: 1.98.4
      sourceRef:
        kind: HelmRepository
        name: tailscale
  values:
    oauth: {}
    operatorConfig:
      hostname: tale-lab-operator
    apiServerProxyConfig:
      mode: "false"
