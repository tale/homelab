---
apiVersion: "tailscale.com/v1alpha1"
kind: "ProxyClass"
metadata:
  name: "metrics"
spec:
  metrics:
    enable: true
  # Publish NodePort static endpoints so tailnet peers connect directly to the
  # Talos nodes instead of relaying every packet through DERP (the cause of the
  # Minecraft lag). Requires UDP ingress to these ports on the node IPs.
  staticEndpoints:
    nodePort:
      ports:
        - port: 32000
          endPort: 32010
      selector:
        kubernetes.io/os: "linux"
