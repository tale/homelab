apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: envoy-gateway
  namespace: envoy-gateway-system
spec:
  instanceSelector:
    matchLabels:
      dashboards: "homelab"
  allowCrossNamespaceImport: true
  folder: Network
  grafanaCom:
    id: 22539
  datasources:
    - inputName: "DS_PROMETHEUS"
      datasourceName: "VictoriaMetrics"
