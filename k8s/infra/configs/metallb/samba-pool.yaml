---
apiVersion: "metallb.io/v1beta1"
kind: "IPAddressPool"
metadata:
  name: "samba-pool"
  namespace: "metallb-system"
spec:
  autoAssign: false
  addresses:
    - "10.0.0.230/32"
---
apiVersion: "metallb.io/v1beta1"
kind: "L2Advertisement"
metadata:
  name: "samba-l2adv"
  namespace: "metallb-system"
spec:
  ipAddressPools:
    - "samba-pool"
