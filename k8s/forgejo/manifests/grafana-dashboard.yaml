kind: GrafanaDashboard
metadata:
  name: forgejo
  namespace: forgejo
spec:
  instanceSelector:
    matchLabels:
      dashboards: "homelab"
  allowCrossNamespaceImport: true
  folder: Applications
  grafanaCom:
    id: 22363
  datasources:
