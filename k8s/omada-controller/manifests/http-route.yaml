apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: omada-controller-tls
  namespace: default
spec:
  endpoints:
    - fqdn:
        hostname: omada-controller.default.svc.cluster.local
        port: 8043
  tls:
    insecureSkipVerify: true
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: omada-controller
  namespace: default
spec:
  parentRefs:
    - name: envoy-gw
      sectionName: https
      namespace: default
  hostnames:
    - omada.tale.me
  rules:
    - backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: omada-controller-tls
