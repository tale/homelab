apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: omada-mongodb-data
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: cluster-nvmf
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: omada-mongodb
  namespace: default
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: me.tale.omada-mongodb
  template:
    metadata:
      labels:
        app: me.tale.omada-mongodb
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mongodb
          image: mongo:8
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: root
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: omada-db-secret
                  key: mongodb-root-password
            - name: MONGO_INITDB_DATABASE
              value: omada
            - name: OMADA_DB_USER
              value: omada
            - name: OMADA_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: omada-db-secret
                  key: mongodb-passwords
          volumeMounts:
            - name: data
              mountPath: /data/db
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: "1"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: omada-mongodb-data
        - name: init-scripts
          configMap:
            name: omada-mongodb-init
---
apiVersion: v1
kind: Service
metadata:
  name: omada-mongodb
  namespace: default
spec:
  selector:
    app: me.tale.omada-mongodb
  ports:
    - port: 27017
      targetPort: 27017
