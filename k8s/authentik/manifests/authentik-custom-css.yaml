apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-custom-css
  namespace: authentik
data:
  custom.css: |
    /* Custom CSS for authentik flow pages */

    /* Flow executor background */
    ak-flow-executor::part(flow-background) {
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      background-size: cover;
    }

    /* Login card styling */
    ak-flow-executor::part(flow-card) {
      border-radius: 16px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    /* Brand color overrides */
    :root {
      --ak-accent: #6c63ff;
      --pf-v5-global--primary-color--100: #6c63ff;
      --pf-v5-global--primary-color--200: #534bcc;
      --pf-v5-global--link--Color: #6c63ff;
      --pf-v5-global--link--Color--hover: #534bcc;
    }

    /* Button styling */
    ak-flow-executor .pf-v5-c-button.pf-m-primary,
    ak-flow-executor .pf-c-button.pf-m-primary {
      background-color: #6c63ff;
      border-radius: 8px;
      transition: background-color 0.2s ease;
    }

    ak-flow-executor .pf-v5-c-button.pf-m-primary:hover,
    ak-flow-executor .pf-c-button.pf-m-primary:hover {
      background-color: #534bcc;
    }
