apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: authentik
  namespace: authentik
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: authentik
      app.kubernetes.io/name: authentik
      app.kubernetes.io/component: server-metrics
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
