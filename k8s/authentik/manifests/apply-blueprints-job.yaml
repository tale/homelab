apiVersion: batch/v1
kind: Job
metadata:
  name: authentik-apply-blueprints
  namespace: authentik
  annotations:
    kustomize.toolkit.fluxcd.io/force: "enabled"
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: apply
          image: ghcr.io/goauthentik/server:2026.2.2
          command: ["env", "HOME=/tmp", "ak", "shell", "-c"]
          args:
            - |
              from authentik.blueprints.models import BlueprintInstance
              from authentik.blueprints.v1.importer import Importer

              blueprints = [
                  ("mounted/cm-authentik-blueprints/passkey-authentication-flow.yaml",
                   "Tale - Passkey Authentication Flow"),
                  ("mounted/cm-authentik-blueprints/brand-theme.yaml",
                   "Tale - Brand & Theme"),
              ]

              for path, name in blueprints:
                  bp, created = BlueprintInstance.objects.get_or_create(
                      path=path,
                      defaults={"name": name, "enabled": True},
                  )
                  print(f"Blueprint instance {'created' if created else 'exists'}: {bp.name}")

                  content = bp.retrieve()
                  importer = Importer.from_string(content, {})
                  valid, logs = importer.validate()
                  if not valid:
                      for log in logs:
                          print(log)
                      raise SystemExit(f"Blueprint validation failed: {name}")

                  applied = importer.apply()
                  bp.status = "successful"
                  bp.save()
                  print(f"Blueprint applied ({name}): {applied}")
          env:
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: secret-key
            - name: AUTHENTIK_POSTGRESQL__HOST
              value: central-postgres-rw.cnpg-system.svc.cluster.local
            - name: AUTHENTIK_POSTGRESQL__PORT
              value: "5432"
            - name: AUTHENTIK_POSTGRESQL__NAME
              value: authentik
            - name: AUTHENTIK_POSTGRESQL__USER
              value: app
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: db-password
            - name: AUTHENTIK_REDIS__HOST
              value: authentik-redis-master
          volumeMounts:
            - name: blueprints
              mountPath: /blueprints/mounted/cm-authentik-blueprints
      volumes:
        - name: blueprints
          configMap:
            name: authentik-blueprints
