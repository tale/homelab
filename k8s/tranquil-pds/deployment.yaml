apiVersion: apps/v1
kind: Deployment
metadata:
  name: tranquil-pds
  namespace: tranquil-pds
  labels:
    app.kubernetes.io/name: tranquil-pds
spec:
  # tranquil-pds is single-writer (postgres-backed repos + on-disk blobs);
  # we run a single replica and rely on CNPG for the DB HA story.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: tranquil-pds
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tranquil-pds
      annotations:
        # Roll the pod when config.toml changes.
        checksum/config: tranquil-pds-config
    spec:
      containers:
        - name: tranquil-pds
          image: atcr.io/tranquil.farm/tranquil-pds:0.6.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - secretRef:
                name: tranquil-pds-secrets
          env:
            - name: SERVER_HOST
              value: "0.0.0.0"
            - name: SERVER_PORT
              value: "3000"
          volumeMounts:
            - name: config
              mountPath: /etc/tranquil-pds/config.toml
              subPath: config.toml
              readOnly: true
            - name: blobs
              mountPath: /var/lib/tranquil-pds/blobs
          livenessProbe:
            httpGet:
              path: /xrpc/_health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /xrpc/_health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: tranquil-pds-config
        - name: blobs
          persistentVolumeClaim:
            claimName: tranquil-pds-blobs
---
apiVersion: v1
kind: Service
metadata:
  name: tranquil-pds
  namespace: tranquil-pds
  labels:
    app.kubernetes.io/name: tranquil-pds
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: tranquil-pds
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
