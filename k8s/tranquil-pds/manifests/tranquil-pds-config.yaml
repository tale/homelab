apiVersion: v1
kind: ConfigMap
metadata:
  name: tranquil-pds-config
  namespace: tranquil-pds
data:
  config.toml: |
    [server]
    hostname = "pds.tale.me"
    host = "0.0.0.0"
    port = 3000
    user_handle_domains = ["tale.me"]
    invite_code_required = true
    contact_email = "me@tale.me"

    [frontend]
    enabled = true

    [database]
    max_connections = 50
    min_connections = 5

    [storage]
    backend = "filesystem"
    path = "/var/lib/tranquil-pds/blobs"
    repo_backend = "postgres"

    [plc]
    directory_url = "https://plc.directory"

    [firehose]
    buffer_size = 10000
    backfill_hours = 72
    crawlers = ["https://bsky.network"]

    [email]
    from_address = "noreply@tale.me"
    from_name = "Tale PDS"

    [email.smarthost]
    host = "email-smtp.us-east-1.amazonaws.com"
    port = 465
    tls = "tls"
