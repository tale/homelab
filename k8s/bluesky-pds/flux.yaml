apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: bluesky-pds
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-configs
  interval: 1h
  path: ./k8s/bluesky-pds
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
