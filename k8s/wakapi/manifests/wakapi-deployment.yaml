apiVersion: apps/v1
kind: Deployment
metadata:
  name: wakapi
  namespace: wakapi
  labels:
    app.kubernetes.io/name: wakapi
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: wakapi
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wakapi
    spec:
      # Wakapi reads WAKAPI_PORT from its own config; disable Kubernetes'
      # service env var injection to avoid the "wakapi" Service shadowing it.
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: wakapi
          image: ghcr.io/muety/wakapi:2.17.3
          imagePullPolicy: IfNotPresent
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: WAKAPI_LEADERBOARD_ENABLED
              value: "false"
            - name: WAKAPI_AVATAR_URL_TEMPLATE
              value: "https://github.com/{username}.png?size=256"
            - name: WAKAPI_LISTEN_IPV4
              value: "0.0.0.0"
            - name: WAKAPI_LISTEN_IPV6
              value: "-"
            - name: WAKAPI_PUBLIC_URL
              value: "https://wakatime.tale.me"
            - name: WAKAPI_TRUST_REVERSE_PROXY_IPS
              value: "0.0.0.0/0"

            - name: WAKAPI_DB_TYPE
              value: "postgres"
            - name: WAKAPI_DB_HOST
              value: "central-postgres-rw.cnpg-system.svc.cluster.local"
            - name: WAKAPI_DB_PORT
              value: "5432"
            - name: WAKAPI_DB_NAME
              value: "wakapi"
            - name: WAKAPI_DB_USER
              value: "app"
            - name: WAKAPI_DB_SSL
              value: "true"
            - name: WAKAPI_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wakapi-db-credentials
                  key: password

            - name: WAKAPI_OIDC_ALLOW_SIGNUP
              value: "true"
            - name: WAKAPI_OIDC_PROVIDERS_0_NAME
              value: "authentik"
            - name: WAKAPI_OIDC_PROVIDERS_0_DISPLAY_NAME
              value: "Authentik"
            - name: WAKAPI_OIDC_PROVIDERS_0_ENDPOINT
              value: "https://auth.tale.me/application/o/waka-time/"
            - name: WAKAPI_OIDC_PROVIDERS_0_USERNAME_CLAIM
              value: "preferred_username"
            - name: WAKAPI_OIDC_PROVIDERS_0_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: wakapi-oidc
                  key: client-id
            - name: WAKAPI_OIDC_PROVIDERS_0_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: wakapi-oidc
                  key: client-secret

            - name: WAKAPI_PASSWORD_SALT
              valueFrom:
                secretKeyRef:
                  name: wakapi-secrets
                  key: password-salt

            - name: WAKAPI_MAIL_ENABLED
              value: "true"
            - name: WAKAPI_MAIL_SENDER
              value: "Wakapi <noreply@tale.me>"
            - name: WAKAPI_MAIL_SMTP_HOST
              value: "email-smtp.us-east-1.amazonaws.com"
            - name: WAKAPI_MAIL_SMTP_PORT
              value: "587"
            - name: WAKAPI_MAIL_SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: wakapi-secrets
                  key: smtp-user
            - name: WAKAPI_MAIL_SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: wakapi-secrets
                  key: smtp-pass
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
