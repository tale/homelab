apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics-k8s-stack
  namespace: observability-system
spec:
  interval: 1h
  chart:
    spec:
      chart: victoria-metrics-k8s-stack
      version: 0.72.5
      sourceRef:
        kind: HelmRepository
        name: victoriametrics
  install:
    createNamespace: true
  values:
    grafana:
      enabled: false
    defaultDashboards:
      enabled: false
    vmsingle:
      enabled: true
      spec:
        retentionPeriod: "180d"
        storage:
          storageClassName: cluster-nvmf
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 150Gi
    vmagent:
      enabled: true
      spec:
        scrapeInterval: 15s
        selectAllByDefault: true
        extraArgs:
          promscrape.streamParse: "true"
    vmalert:
      enabled: true
      spec:
        evaluationInterval: 30s
        selectAllByDefault: true
    alertmanager:
      enabled: true
      spec:
        configSecret: ""
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: cluster-nvmf
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 1Gi
      config:
        route:
          receiver: pushover
          group_by: ["alertname", "namespace"]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
          routes:
            - receiver: pushover
              matchers:
                - severity =~ "critical|warning"
        receivers:
          - name: pushover
            pushover_configs:
              - user_key_file: /etc/alertmanager/secrets/pushover-credentials/user_key
                token_file: /etc/alertmanager/secrets/pushover-credentials/api_token
                priority: '{{ if eq .CommonLabels.severity "critical" }}1{{ else }}0{{ end }}'
                title: "{{ .CommonLabels.alertname }}"
                message: '{{ range .Alerts }}{{ .Annotations.summary }}{{ "\n" }}{{ end }}'
      secrets:
        - pushover-credentials
    victoria-metrics-operator:
      crds:
        enabled: false
        plain: false
      operator:
        disable_prometheus_converter: false
    prometheus-node-exporter:
      enabled: true
    kube-state-metrics:
      enabled: true
    kubeProxy:
      enabled: false
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeEtcd:
      enabled: false
    kubeApiServer:
      enabled: true
    kubelet:
      enabled: true
    coreDns:
      enabled: true
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: logs-collector
  namespace: observability-system
spec:
  dependsOn:
    - name: victoria-metrics-k8s-stack
  interval: 1h
  chart:
    spec:
      chart: victoria-logs-collector
      version: 0.2.13
      sourceRef:
        kind: HelmRepository
        name: victoriametrics
  values:
    remoteWrite:
      - url: http://vlsingle-vlogs.observability-system.svc.cluster.local:9428
