---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "samba-store"
  namespace: "home-automation"
  labels:
    app.kubernetes.io/name: "samba-store"
spec:
  replicas: 1
  strategy:
    type: "Recreate"
  selector:
    matchLabels:
      app.kubernetes.io/name: "samba-store"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "samba-store"
    spec:
      dnsPolicy: "ClusterFirstWithHostNet"
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        seccompProfile:
          type: "RuntimeDefault"
      containers:
        - name: "samba"
          image: "ghcr.io/crazy-max/samba:4.21.4"
          imagePullPolicy: "IfNotPresent"
          env:
            - name: "TZ"
              value: "America/New_York"
            - name: "SAMBA_SERVER_STRING"
              value: "Local home storage"
            - name: "WSDD2_ENABLE"
              value: "1"
            - name: "WSDD2_HOSTNAME"
              value: "tale-home"
            - name: "WSDD2_NETBIOS_NAME"
              value: "TALE-HOME"
          ports:
            - name: "smb"
              containerPort: 445
              protocol: "TCP"
            - name: "wsdd2"
              containerPort: 3702
              protocol: "UDP"
          volumeMounts:
            - name: "data"
              mountPath: "/samba"
            - name: "config"
              mountPath: "/data/config.yml"
              subPath: "config.yml"
              readOnly: true
          livenessProbe:
            tcpSocket:
              port: 445
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          readinessProbe:
            tcpSocket:
              port: 445
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
            capabilities:
              add:
                - ALL
                - NET_ADMIN # Required for WSDD2
                - NET_BIND_SERVICE
                - NET_RAW
                - SETUID
                - SETGID
                - CHOWN
                - FOWNER
            seccompProfile:
              type: "RuntimeDefault"
        - name: "openssh-server"
          image: "lscr.io/linuxserver/openssh-server:latest"
          imagePullPolicy: "IfNotPresent"
          env:
            - name: "PUID"
              value: "1000"
            - name: "PGID"
              value: "1000"
            - name: "TZ"
              value: "America/New_York"
            - name: "PUBLIC_KEY_URL"
              value: "https://github.com/tale.keys"
            - name: "SUDO_ACCESS"
              value: "false"
            - name: "PASSWORD_ACCESS"
              value: "false"
            - name: "USER_NAME"
              value: "tale"
          ports:
            - name: "ssh"
              containerPort: 2222
              protocol: "TCP"
          volumeMounts:
            - name: "data"
              mountPath: "/data"
          livenessProbe:
            tcpSocket:
              port: 2222
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          readinessProbe:
            tcpSocket:
              port: 2222
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
            capabilities:
              add:
                - "ALL"
            seccompProfile:
              type: "RuntimeDefault"
      volumes:
        - name: "data"
          persistentVolumeClaim:
            claimName: "smb-store"
        - name: "config"
          secret:
            secretName: "samba-config"
