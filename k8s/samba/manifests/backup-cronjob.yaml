apiVersion: batch/v1
kind: CronJob
metadata:
  name: samba-backup
  namespace: home-automation
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 21600
      template:
        spec:
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          restartPolicy: OnFailure
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: samba-store
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: s5cmd
              image: peakcom/s5cmd:v2.3.0
              command: ["/s5cmd"]
              args:
                - "--endpoint-url=https://s3.wasabisys.com"
                - "--numworkers=16"
                - "sync"
                - "/samba/"
                - "s3://tale-home/smb-backup/"
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: samba-backup-credentials
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: samba-backup-credentials
                      key: AWS_SECRET_ACCESS_KEY
              volumeMounts:
                - name: data
                  mountPath: /samba
                  readOnly: true
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: "1"
                  memory: 512Mi
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                capabilities:
                  drop: ["ALL"]
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: smb-store
