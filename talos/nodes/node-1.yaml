---
machine:
  kubelet:
    nodeIP:
      validSubnets:
        - "172.31.42.2/24"
  network:
    interfaces:
      # 1GBe LAN interface
      - deviceSelector:
          hardwareAddr: "14:b3:1f:2c:8e:8a"
        dhcp: false
        mtu: 1500
        addresses:
          - "10.0.0.201/24"
        routes:
          - network: "0.0.0.0/0"
            gateway: "10.0.0.1"

      # 2.5GBe VPC interface
      - deviceSelector:
          hardwareAddr: "02:26:25:02:04:9b"
        dhcp: false
        mtu: 9000
        addresses:
          - "172.31.42.2/24"
        vip:
          ip: "172.31.42.100"
