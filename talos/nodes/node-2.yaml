---
machine:
  kubelet:
    nodeIP:
      validSubnets:
        - "172.31.42.3/24"
  network:
    interfaces:
      # 1GBe LAN interface
      - deviceSelector:
          hardwareAddr: "b8:85:84:9a:e0:d0"
        dhcp: false
        mtu: 1500
        addresses:
          - "10.0.0.202/24"
        routes:
          - network: "0.0.0.0/0"
            gateway: "10.0.0.1"

      # 2.5GBe VPC interface
      - deviceSelector:
          hardwareAddr: "02:26:25:02:04:df"
        dhcp: false
        mtu: 9000
        addresses:
          - "172.31.42.3/24"
        vip:
          ip: "172.31.42.100"
